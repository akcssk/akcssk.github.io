    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>適当なページ</title>
    

    <style>
        /* --- CSS --- */
        
        /* 全体のスタイル */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }

        /* コンテナ */
        .container {
            max-width: 960px;
            margin: auto;
            overflow: hidden;
            padding: 0 20px;
        }

        /* ヘッダー */
        .main-header {
            background: #fff;
            padding: 20px 0;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }
        
        .main-header h1 {
            margin: 0;
            color: #555;
        }

        /* メインコンテンツ */
        main {
            padding: 20px 0;
        }

        /* カードレイアウト */
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 20px;
            text-align: center;
        }
        
        .card h2 {
            margin-top: 0;
            color: #007BFF;
        }
        
        .card p {
            font-size: 0.9em;
        }

        /* フッター */
        .main-footer {
            background: #333;
            color: #fff;
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="container">
            <h1>📝 適当なウェブサイト</h1>
        </div>
    </header>

    <main class="container">
        <div class="card-container">

            <div>
                現在のサイト　
                <script>document.write(new Date().toLocaleString())</script>
            </div>
            <div class="card">
                <h2>カード 1</h2>
                <p>これは適当に作ったカードです。コンテンツがここに入ります。レイアウトの確認に使えます。</p>
            </div>
            <div class="card">
                <h2>カード 2</h2>
                <p>CSSのGrid Layoutを使って、レスポンシブに配置されるようにしています。ウィンドウ幅を変えてみてください。</p>
            </div>
            <div class="card">
                <h2>カード 3</h2>
                <p>特に意味のある内容はありませんが、見た目はそれっぽくなるようにスタイルを当てています。</p>
            </div>
        </div>


        <form id="formtest">
  <h2>個人情報入力（テスト）</h2>

  <p>
    <label>
      氏名：
      <input type="text" name="name" placeholder="山田 太郎" required>
    </label>
  </p>

  <p>
    <label>
      フリガナ：
      <input type="text" name="kana" placeholder="ヤマダ タロウ">
    </label>
  </p>

  <p>
    <label>
      生年月日：
      <input type="date" name="birthday" required>
    </label>
  </p>

  <p>
    <label>
      性別：
      <select name="gender">
        <option value="">選択してください</option>
        <option value="male">男性</option>
        <option value="female">女性</option>
        <option value="other">その他</option>
        <option value="na">未回答</option>
      </select>
    </label>
  </p>

  <p>
    <label>
      メール：
      <input type="email" name="email" placeholder="test@example.com" required>
    </label>
  </p>

  <p>
    <label>
      電話番号：
      <input type="tel" name="tel" placeholder="090-1234-5678" pattern="^\d{2,4}-\d{2,4}-\d{3,4}$">
    </label>
  </p>

  <p>
    <label>
      郵便番号：
      <input type="text" name="zip" placeholder="123-4567" pattern="^\d{3}-\d{4}$">
    </label>
  </p>

  <p>
    <label>
      住所：
      <input type="text" name="address" placeholder="東京都渋谷区〇〇1-2-3" required>
    </label>
  </p>

  <p>
    <label>
      マイナンバー（ダミー）：
      <input type="text" name="mynumber" placeholder="123456789012" pattern="^\d{12}$">
    </label>
  </p>

  <p>
    <label>
      備考：
      <textarea name="note" rows="3" placeholder="テスト用メモ"></textarea>
    </label>
  </p>

  <p>
    <label>
      <input type="checkbox" name="agree" required>
      個人情報の取扱いに同意します（テスト）
    </label>
  </p>

  <p>
    <button type="submit">送信（ダミー）</button>
    <button type="reset">リセット</button>
  </p>
</form>

    </main>

    <footer class="main-footer">
        <p>&copy; 2025 適当なフッター</p>
    </footer>
